- HomeScreen As screen:
    Fill: =RGBA(248, 250, 252, 1)
    OnVisible: |-
        =Set(gLastRefresh, Now());
        ClearCollect(gCloudFlows,
            PowerAutomateManagement.ListFlows(gCurrentEnv).value);
        ClearCollect(gDesktopFlows,
            PowerAutomateManagement.ListDesktopFlows(gCurrentEnv).value);
        ClearCollect(gPowerApps,
            PowerAppsforMakers.GetApps().value)

    # ── Nav bar
    - NavBg As rectangle:
        X: =0
        Y: =0
        Width: =1366
        Height: =56
        Fill: =RGBA(15, 23, 42, 1)
        BorderStyle: =BorderStyle.None
    - NavLogo As label:
        X: =16
        Y: =0
        Width: =36
        Height: =56
        Text: ="⚡"
        Size: =22
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
    - NavTitle As label:
        X: =56
        Y: =0
        Width: =700
        Height: =56
        Text: ="Power Platform Monitor"
        Size: =18
        FontWeight: =FontWeight.Semibold
        Color: =RGBA(255, 255, 255, 1)
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        VerticalAlign: =VerticalAlign.Middle
    - NavEnv As label:
        X: =986
        Y: =0
        Width: =260
        Height: =56
        Text: =Concatenate("Env: ", gCurrentEnvName)
        Size: =12
        Color: =RGBA(255, 255, 255, 0.7)
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
        VerticalAlign: =VerticalAlign.Middle
    - NavRefresh As button:
        X: =1256
        Y: =10
        Width: =96
        Height: =36
        Text: ="⟳ Refresh"
        Fill: =RGBA(255, 255, 255, 0.15)
        Color: =RGBA(255, 255, 255, 1)
        BorderStyle: =BorderStyle.None
        FontWeight: =FontWeight.Semibold
        OnSelect: |-
            =Set(gLastRefresh, Now());
            ClearCollect(gCloudFlows,
                PowerAutomateManagement.ListFlows(gCurrentEnv).value);
            ClearCollect(gDesktopFlows,
                PowerAutomateManagement.ListDesktopFlows(gCurrentEnv).value);
            ClearCollect(gPowerApps,
                PowerAppsforMakers.GetApps().value)

