        X: =387
        Y: =382
        Width: =592
        Height: =32
        Text: ="Permissions needed: Flow.Read.All · Flow.Manage.All · PowerApps.Read.All · User.Read.All"
        Size: =11
        Color: =RGBA(100, 116, 139, 1)
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
    - AD_Sep2 As rectangle:
        X: =363
        Y: =422
        Width: =640
        Height: =1
        Fill: =RGBA(226, 232, 240, 1)
        BorderStyle: =BorderStyle.None
    - AD_ConnStatus As label:
        X: =387
        Y: =432
        Width: =592
        Height: =26
        Text: =If(gAdminConnected, "✅  Connected — all tenant assets visible", "❌  Not connected")
        Size: =13
        Color: =If(gAdminConnected, RGBA(16,124,16,1), RGBA(196,43,28,1))
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
    - AD_HideNote As label:
        X: =387
        Y: =614
        Width: =592
        Height: =16
        Text: ="To hide this screen button: set gHideAdminForever = true in App.OnStart"
        Size: =10
        Color: =RGBA(150, 150, 150, 1)
        Fill: =RGBA(0, 0, 0, 0)
        BorderStyle: =BorderStyle.None
    - AD_BtnSave As button:
        X: =773
        Y: =572
        Width: =218
        Height: =40
        Text: ="💾  Save & Connect"
        Fill: =RGBA(15, 108, 189, 1)
        Color: =RGBA(255, 255, 255, 1)
        BorderStyle: =BorderStyle.None
        FontWeight: =FontWeight.Semibold
        OnSelect: |-
            =If(IsBlank(AD_InTenant.Text) || IsBlank(AD_InClient.Text) || IsBlank(AD_InSecret.Text),
                Notify("Tenant ID, Client ID and Secret are required", NotificationType.Error),
                Set(gTenantId, AD_InTenant.Text);
                Set(gClientId, AD_InClient.Text);
                Set(gClientSecret, AD_InSecret.Text);
                Set(gEnvId, If(IsBlank(AD_InEnv.Text), "Default", AD_InEnv.Text));
                Set(gCurrentEnvName, If(IsBlank(AD_InEnv.Text), "Default Environment", AD_InEnv.Text));
                Set(gAdminConnected, true);
                ClearCollect(gCloudFlows, PowerAutomateManagement.ListFlows(gTenantId).value);
                ClearCollect(gDesktopFlows, PowerAutomateManagement.ListDesktopFlows(gTenantId).value);
                ClearCollect(gPowerApps, PowerAppsforMakers.GetApps().value);
                Notify("Connected — all tenant data loaded", NotificationType.Success);
                Navigate(HomeScreen))
    - AD_BtnCancel As button:
        X: =387
        Y: =572
        Width: =110
        Height: =40
        Text: ="Cancel"
        Fill: =RGBA(241, 245, 249, 1)
        Color: =RGBA(51, 65, 85, 1)
        BorderStyle: =BorderStyle.None
        OnSelect: =Back()
